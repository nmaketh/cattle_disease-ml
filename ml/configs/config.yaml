seed: 42
project_root: .
paths:
  tonic_symptoms_csv: data/raw/tonic_default/synthetic_cattle_symptoms.csv
  image_sources:
    - ml/data/processed/images_merged
  symptoms_sources:
    - data/raw/captaingee_livestock_disease_diagnosis_dataset/animal_disease_dataset.csv
    - data/raw/researcher1548_livestock_symptoms_and_diseases/animal_disease_dataset.csv
  images_merged: ml/data/processed/images_merged
  symptoms_merged_csv: ml/data/processed/symptoms_merged.csv
  splits_manifest_csv: ml/data/processed/splits_manifest.csv
  artifacts_dir: ml/artifacts
labels:
  final_labels: ["Normal", "LSD", "FMD", "ECF", "CBPP"]
  image_labels: ["Normal", "LSD", "FMD"]
split:
  train: 0.7
  val: 0.15
  test: 0.15
image:
  img_size: 224
  batch_size: 32
  head_epochs: 8
  finetune_epochs: 8
  fine_tune_at: 120
  lr_head: 0.001
  lr_finetune: 0.00005
  early_stop_patience: 5
  reduce_lr_patience: 2
  image_confidence_hi: 0.8
symptom:
  # Primary candidate: HistGradientBoostingClassifier — best tabular generalisation,
  # built-in L2 regularisation, ~10-50 MB model vs 591 MB overfitted RF.
  # RF / ExtraTrees kept as fallback with corrected regularisation params.
  model_type: hist_gradient_boosting
  model_candidates: ["hist_gradient_boosting", "random_forest", "extra_trees"]
  # Shared defaults (each candidate's search space overrides these)
  n_estimators: 300        # RF/ET; HGB uses max_iter inside its search space
  max_depth: 12            # RF/ET ceiling; was 24 (caused train_f1=1.0)
  min_samples_leaf: 6      # RF/ET floor; was 1 (single-sample leaves → overfit)
  # Hyperparameter search
  search_n_iter: 40        # RandomizedSearchCV iterations per candidate (was 24)
  cv_folds: 5              # StratifiedKFold splits (was 4)
  # Quality gates
  target_macro_f1: 0.90
  max_overfit_gap: 0.03    # Stronger generalization gate on train-vs-val gap
  selection_overfit_penalty: 1.00
  cv_max_overfit_gap: 0.03
  cv_overfit_penalty: 1.25
  # Categorical feature handling
  include_meta_features: true
  max_categorical_levels: 12
  # Bootstrap / synthetic data
  min_unique_rows: 100
  bootstrap_if_insufficient: true
  bootstrap_samples_per_label: 400
  bootstrap_labels: ["LSD", "FMD", "ECF", "CBPP"]  # Normal excluded — symptom model is 4-class only
  bootstrap_core_prob: 0.78
  bootstrap_support_prob: 0.42
  bootstrap_noise_prob: 0.03
fusion:
  image_weight: 0.65
  symptom_weight: 0.35
  symptom_reliability_real: 1.0
  symptom_reliability_bootstrap: 0.2
  symptom_reliability_unknown: 0.5
  symptom_only_min_reliability: 0.6
  temperature: 1.1
  rule_threshold: 0.62
  contradiction_threshold: 0.75
rules:
  ecf_weights:
    fever: 0.18
    swollen_lymph_nodes: 0.24
    eye_discharge: 0.14
    nasal_discharge: 0.10
    difficulty_breathing: 0.16
    loss_of_appetite: 0.12
    depression: 0.06
  cbpp_weights:
    fever: 0.14
    coughing: 0.21
    difficulty_breathing: 0.17
    rapid_shallow_breathing: 0.12
    chest_pain_signs: 0.16
    nasal_discharge: 0.08
    grunt_on_expiration: 0.08
    extended_neck_posture: 0.04
  disease_symptom_catalog:
    Normal:
      core: []
      supporting:
        - bright_eyes
        - normal_feed_intake
        - normal_respiration
        - normal_mobility
        - healthy_skin
        - no_lesions
    LSD:
      core:
        - fever
        - painless_lumps
        - skin_nodules
        - enlarged_lymph_nodes
      supporting:
        - nasal_discharge
        - eye_discharge
        - reduced_milk_yield
        - limb_swelling
        - depression
        - loss_of_appetite
    FMD:
      core:
        - fever
        - mouth_blisters
        - tongue_sores
        - foot_lesions
        - drooling
      supporting:
        - lameness
        - loss_of_appetite
        - reduced_milk_yield
        - difficulty_walking
        - gum_sores
    ECF:
      core:
        - fever
        - swollen_lymph_nodes
        - difficulty_breathing
        - loss_of_appetite
      supporting:
        - eye_discharge
        - nasal_discharge
        - diarrhoea
        - anaemia
        - neurological_signs
        - corneal_opacity
        - depression
    CBPP:
      core:
        - fever
        - coughing
        - difficulty_breathing
        - rapid_shallow_breathing
        - chest_pain_signs
      supporting:
        - nasal_discharge
        - extended_neck_posture
        - head_lowered
        - arched_back
        - grunt_on_expiration
        - recumbency
        - weight_loss
        - exercise_intolerance
        - anorexia
        - depression
thresholds:
  urgent_rule_score: 0.78
  low_confidence: 0.45
