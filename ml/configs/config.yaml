seed: 42
project_root: .
paths:
  image_sources:
    - ml/data/processed/images_merged
  symptoms_sources:
    - data/raw/captaingee_livestock_disease_diagnosis_dataset/animal_disease_dataset.csv
    - data/raw/researcher1548_livestock_symptoms_and_diseases/animal_disease_dataset.csv
  images_merged: ml/data/processed/images_merged
  symptoms_merged_csv: ml/data/processed/symptoms_merged.csv
  splits_manifest_csv: ml/data/processed/splits_manifest.csv
  artifacts_dir: ml/artifacts
labels:
  final_labels: ["Normal", "LSD", "FMD", "ECF", "CBPP"]
  image_labels: ["Normal", "LSD", "FMD"]
split:
  train: 0.7
  val: 0.15
  test: 0.15
image:
  img_size: 224
  batch_size: 32
  head_epochs: 8
  finetune_epochs: 8
  fine_tune_at: 120
  lr_head: 0.001
  lr_finetune: 0.00005
  early_stop_patience: 5
  reduce_lr_patience: 2
  image_confidence_hi: 0.8
symptom:
  model_type: random_forest
  n_estimators: 500
  max_depth: 24
  min_samples_leaf: 1
fusion:
  image_weight: 0.65
  symptom_weight: 0.35
  temperature: 1.1
  rule_threshold: 0.62
  contradiction_threshold: 0.75
rules:
  ecf_weights:
    fever: 0.18
    swollen_lymph_nodes: 0.24
    eye_discharge: 0.14
    nasal_discharge: 0.10
    difficulty_breathing: 0.16
    loss_of_appetite: 0.12
    depression: 0.06
  cbpp_weights:
    fever: 0.14
    coughing: 0.21
    difficulty_breathing: 0.17
    rapid_shallow_breathing: 0.12
    chest_pain_signs: 0.16
    nasal_discharge: 0.08
    grunt_on_expiration: 0.08
    extended_neck_posture: 0.04
  disease_symptom_catalog:
    Normal:
      core: []
      supporting:
        - bright_eyes
        - normal_feed_intake
        - normal_respiration
        - normal_mobility
        - healthy_skin
        - no_lesions
    LSD:
      core:
        - fever
        - painless_lumps
        - skin_nodules
        - enlarged_lymph_nodes
      supporting:
        - nasal_discharge
        - eye_discharge
        - reduced_milk_yield
        - limb_swelling
        - depression
        - loss_of_appetite
    FMD:
      core:
        - fever
        - mouth_blisters
        - tongue_sores
        - foot_lesions
        - drooling
      supporting:
        - lameness
        - loss_of_appetite
        - reduced_milk_yield
        - difficulty_walking
        - gum_sores
    ECF:
      core:
        - fever
        - swollen_lymph_nodes
        - difficulty_breathing
        - loss_of_appetite
      supporting:
        - eye_discharge
        - nasal_discharge
        - diarrhoea
        - anaemia
        - neurological_signs
        - corneal_opacity
        - depression
    CBPP:
      core:
        - fever
        - coughing
        - difficulty_breathing
        - rapid_shallow_breathing
        - chest_pain_signs
      supporting:
        - nasal_discharge
        - extended_neck_posture
        - head_lowered
        - arched_back
        - grunt_on_expiration
        - recumbency
        - weight_loss
        - exercise_intolerance
        - anorexia
        - depression
thresholds:
  urgent_rule_score: 0.78
  low_confidence: 0.45
